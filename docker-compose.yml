version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: spotter
      POSTGRES_USER: spotter
      POSTGRES_PASSWORD: spotter_local
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./spotter
    env_file: ./spotter/.env
    environment:
      DJANGO_ENV: local
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://spotter:spotter_local@db:5432/spotter
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./spotter:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  celery:
    build: ./spotter
    env_file: ./spotter/.env
    environment:
      DJANGO_ENV: local
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - backend
    volumes:
      - ./spotter:/app
    command: celery -A spotter worker -l INFO

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./spotter_frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
